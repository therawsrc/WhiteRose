name: iOS Release Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual execution from the GitHub interface

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Flutter Dependencies
        run: flutter pub get

      # NOTE: For an installable IPA, you must configure code signing here.
      # This requires Base64 encoded certificates stored in GitHub Secrets.
      # Without code signing, the build process will generate an unsigned archive.

      - name: Build iOS Application
        run: flutter build ipa --release --no-codesign

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-artifact
          path: build/ios/archive/Runner.xcarchive