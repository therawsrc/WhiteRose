name: iOS Unsigned IPA Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ios:
    name: Build Unsigned iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build iOS Archive (Unsigned)
        run: flutter build ipa --release --no-codesign

      - name: Package Application into Unsigned IPA
        run: |
          # Navigate to the directory containing the compiled .app
          cd build/ios/archive/Runner.xcarchive/Products/Applications
          
          # Create the required Payload directory structure
          mkdir Payload
          
          # Move the compiled application into the Payload directory
          mv Runner.app Payload/
          
          # Compress the Payload directory into the final .ipa format
          zip -r ../../../../../whiterose-unsigned.ipa Payload

      - name: Upload Unsigned IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: whiterose-unsigned-ipa
          path: build/ios/whiterose-unsigned.ipa