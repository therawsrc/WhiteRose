name: iOS Unsigned IPA Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ios:
    name: Build Unsigned iOS IPA
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build iOS Archive (Unsigned)
        run: flutter build ipa --release --no-codesign

      - name: Package Application into Unsigned IPA
        run: |
          cd build/ios/archive/Runner.xcarchive/Products/Applications
          
          mkdir Payload
          mv Runner.app Payload/
          
          # Utilize absolute workspace path to guarantee correct artifact placement
          zip -r $GITHUB_WORKSPACE/build/ios/whiterose-unsigned.ipa Payload

      - name: Upload Unsigned IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: whiterose-unsigned-ipa
          path: build/ios/whiterose-unsigned.ipa